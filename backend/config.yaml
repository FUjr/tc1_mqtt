# Mosquitto 容器配置
container_name: "mqtt-broker"
container_passwd_path: "/mosquitto/config/passwd"  # 容器内passwd文件路径
host_passwd_path: "/data/passwd"                   # 容器外passwd文件路径（Docker挂载路径）
acl_path: "/data/acl"                              # ACL文件路径（Docker挂载路径）

# ACL模式列表, %s 会被替换为用户的MAC地址(大写和小写各一份)
acl_patterns:
  - "device/ztc1/%s/#"
  - "homeassistant/+/%s/#"

# Web管理配置
admin_username: "admin"
admin_password: "admin123"

# 注册等级:
#   0 = 禁止注册
#   1 = 任意注册
#   2 = 仅邮箱注册（需邮箱验证码激活）
register_level: 2

# 联系维护者信息（显示在注册页）
contact_info: "如需帮助请联系管理员"

# SMTP 邮件配置（register_level=2 时必填）
smtp:
  host: "smtp.qiye.aliyun.com"
  port: 465
  username: "example@fjrcn.cn"
  password: "test"
  from: "example@fjrcn.cn"
  tls: true   # true=SSL/TLS(465), false=STARTTLS(587)

# 服务配置
listen_addr: ":8080"
